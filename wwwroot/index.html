<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Downloader</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <h1>🎮 Steam DL</h1>
            </div>
            <nav class="nav">
                <button class="nav-button selected" data-page="games">
                    📚 Games
                </button>
                <button class="nav-button" data-page="sources">
                    📦 Sources
                </button>
                <button class="nav-button" data-page="settings">
                    ⚙️ Settings
                </button>
            </nav>
        </aside>

        <main class="content">
            <div class="header">
                <h2 id="page-title">Games</h2>
                <button class="btn btn-primary" id="add-game-btn">
                    ➕ Add Game
                </button>
            </div>

            <div class="pages">
                <!-- Games Page -->
                <div id="games" class="page active">
                    <div class="games-grid" id="games-grid">
                        <div class="game-card">
                            <div class="game-placeholder">No games yet</div>
                        </div>
                    </div>
                </div>

                <!-- Sources Page -->
                <div id="sources" class="page">
                    <div class="sources-list">
                        <h3>Manifest Sources</h3>
                        <div class="source-item">
                            <span>GitHub</span>
                            <button class="btn btn-sm</span>">Edit</button>
                        </div>
                        <div class="source-item">
                            <span>Kernel</span>
                            <button class="btn btn-sm">Edit</button>
                        </div>
                    </div>
                </div>

                <!-- Settings Page -->
                <div id="settings" class="page">
                    <div class="settings-form">
                        <div class="form-group">
                            <label for="download-path">Download Directory:</label>
                            <input type="text" id="download-path" placeholder="~/games" />
                        </div>
                        <div class="form-group">
                            <label for="max-parallel">Max Parallel Downloads:</label>
                            <input type="number" id="max-parallel" value="2" min="1" max="10" />
                        </div>
                        <button class="btn btn-primary">Save Settings</button>
                    </div>
                </div>
            </div>

            <!-- Download Progress Modal -->
            <div id="progress-modal" class="modal hidden">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3 id="modal-title">Download Game</h3>
                        <button class="close-btn">&times;</button>
                    </div>
                    <div class="modal-body">
                        <div class="form-group">
                            <label for="app-id-input">Steam App ID:</label>
                            <input type="text" id="app-id-input" placeholder="e.g., 311210" />
                        </div>
                        <button class="btn btn-primary" id="start-download-btn" style="width: 100%; margin-bottom: 16px;">Start Download</button>
                        <div class="progress-container hidden">
                            <div class="progress-bar">
                                <div class="progress-fill" id="progress-fill"></div>
                            </div>
                            <div class="progress-info">
                                <span id="progress-percent">0%</span>
                                <span id="progress-speed">0 MB/s</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
